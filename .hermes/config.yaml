model:
  default: "moonshot-v1-32k"
  provider: custom
  context_length: 64000
  custom:
    base_url: "${OPENAI_BASE_URL}"
    api_key: "${OPENAI_API_KEY}"

platforms:
  telegram:
    enabled: true
    token: "${TELEGRAM_BOT_TOKEN}"
    reply_to_mode: "first"
    extra:
      require_mention: false
      disable_link_previews: false
